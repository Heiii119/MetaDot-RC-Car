<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TT02 模型車 - 課程簡報</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f5f5f2;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #7a1f2b, #a52836);
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo { font-weight: bold; font-size: 1.3rem; letter-spacing: 2px; }
    header h1 { font-size: 1.6rem; }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    .step-tag {
      display: inline-block;
      background: #111;
      color: white;
      padding: 8px 24px;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .step-desc { font-size: 1.2rem; color: #444; margin-bottom: 20px; }

    /* Canva 簡報嵌入容器（16:9 響應式） */
    .canva-wrap {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 56.25%;   /* 16:9 比例 */
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background: #000;
    }

    .canva-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .info-card {
      margin-top: 25px;
      background: white;
      border-left: 5px solid #a52836;
      padding: 20px 25px;
      border-radius: 8px;
    }

    .info-card h3 { color: #a52836; margin-bottom: 10px; }
    .info-card ul { margin-left: 20px; color: #444; }

    .btn-row { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      cursor: pointer;
      background: #a52836;
      color: white;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover { background: #7a1f2b; }
    .btn.next { background: #111; }
    .btn.next:hover { background: #000; }
  </style>
</head>

<body>

  <header>
    <div class="logo">◆ META DOT</div>
    <h1>TT02 模型車 · 課程簡報</h1>
  </header>

  <div class="container">

    <div class="step-tag">課程簡介</div>
    <div class="step-desc">📊 請先觀看下方簡報，了解本次組裝的整體流程與零件概覽</div>

    <!-- ⬇️⬇️⬇️ Canva 簡報嵌入區 ⬇️⬇️⬇️ -->
    <div class="canva-wrap">
      <iframe
        loading="lazy"
        src="https://www.canva.com/design/DAGdGW3QUww/DmZwMv9xU_saHJ4zSoqjow/view"
        allowfullscreen="allowfullscreen"
        allow="fullscreen">
      </iframe>
    </div>
    <!-- ⬆️⬆️⬆️ Canva 簡報嵌入區 ⬆️⬆️⬆️ -->

    <div class="info-card">
      <h3>📖 課程內容</h3>
      <ul>
        <li><b>第一步</b>：認識車頭羊角（Steering Knuckle）</li>
        <li><b>第二步</b>：認識軸承（Bearing）</li>
        <li><b>第三步</b>：將軸承壓入羊角完成組裝</li>
        <li>💡 看完簡報後，點下方按鈕開始互動 3D 教學</li>
      </ul>
    </div>

    <div class="btn-row">
      <a class="btn next" href="tt02_step1.html">➡️ 開始教學：第一步 · 羊角</a>
    </div>

  </div>

</body>
</html>
