<artifact identifier="tt02-viewer" type="text/html" title="TT02 互動 3D 教學範例">

<!DOCTYPE html>

<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TT02 模型車 - 互動 3D 教學</title>

<!-- 載入 Google model-viewer 函式庫 -->

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {

font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;

background: #f5f5f2;

color: #222;

line-height: 1.6;

}

/* 頂部標題列 */

header {

background: linear-gradient(135deg, #7a1f2b, #a52836);

color: white;

padding: 20px 40px;

display: flex;

justify-content: space-between;

align-items: center;

}

header .logo {

font-weight: bold;

font-size: 1.3rem;

letter-spacing: 2px;

}

header h1 { font-size: 1.6rem; }

.container {

max-width: 1100px;

margin: 30px auto;

padding: 0 20px;

}

/* 步驟標籤 */

.step-tag {

display: inline-block;

background: #111;

color: white;

padding: 8px 24px;

font-size: 1.4rem;

font-weight: bold;

border-radius: 4px;

margin-bottom: 8px;

}

.step-desc {

font-size: 1.2rem;

color: #444;

margin-bottom: 20px;

}

/* 3D 檢視器 */

model-viewer {

width: 100%;

height: 500px;

background: linear-gradient(180deg, #ffffff, #e8e8e4);

border-radius: 12px;

box-shadow: 0 4px 20px rgba(0,0,0,0.1);

--poster-color: transparent;

}

/* 熱點標註 */

.hotspot {

background: #a52836;

border: 3px solid white;

border-radius: 50%;

width: 24px;

height: 24px;

cursor: pointer;

box-shadow: 0 2px 6px rgba(0,0,0,0.4);

transition: transform 0.2s;

}

.hotspot:hover { transform: scale(1.3); }

.hotspot-label {

background: rgba(0,0,0,0.85);

color: white;

padding: 6px 12px;

border-radius: 6px;

font-size: 0.9rem;

white-space: nowrap;

transform: translateY(-40px);

pointer-events: none;

}

/* 操作提示 */

.controls-hint {

display: flex;

gap: 25px;

flex-wrap: wrap;

margin-top: 15px;

padding: 15px 20px;

background: white;

border-radius: 10px;

font-size: 0.95rem;

color: #555;

}

.controls-hint div { display: flex; align-items: center; gap: 8px; }

.controls-hint .icon { font-size: 1.3rem; }

/* 零件資訊卡 */

.info-card {

margin-top: 25px;

background: white;

border-left: 5px solid #a52836;

padding: 20px 25px;

border-radius: 8px;

}

.info-card h3 { color: #a52836; margin-bottom: 10px; }

.info-card ul { margin-left: 20px; color: #444; }

/* 底部按鈕 */

.btn-row { margin-top: 20px; display: flex; gap: 12px; }

.btn {

padding: 12px 24px;

border: none;

border-radius: 8px;

font-size: 1rem;

cursor: pointer;

background: #a52836;

color: white;

transition: background 0.2s;

}

.btn:hover { background: #7a1f2b; }

.btn.secondary { background: #555; }

.btn.secondary:hover { background: #333; }

</style>

</head>

<body>

<header>

<div class="logo">◆ META DOT</div>

<h1>車頭羊角 · 互動 3D 教學</h1>

</header>

<div class="container">

<div class="step-tag">第三步</div>

<div class="step-desc">🏁 如圖上螺絲 — 拖動下方模型，從各角度觀察零件如何組裝</div>

<!-- 3D 檢視器 -->

<model-viewer id="viewer" src="FrontUpright.glb" alt="TT02 車頭羊角零件" camera-controls touch-action="pan-y" auto-rotate auto-rotate-delay="3000" rotation-per-second="20deg" shadow-intensity="1" exposure="1" ar ar-modes="webxr scene-viewer quick-look" camera-orbit="45deg 65deg 4m">

<!-- 標註熱點：點擊零件上的紅點會顯示說明 -->
<button class="hotspot" slot="hotspot-1"
        data-position="0 1.7 0.2"
        data-normal="0 0 1">
  <div class="hotspot-label">M4x0.7 螺絲鎖入位置</div>
</button>

<button class="hotspot" slot="hotspot-2"
        data-position="-0.3 0.9 0.3"
        data-normal="0 0 1">
  <div class="hotspot-label">羊角本體</div>

</button>

<!-- AR 按鈕 -->
<button slot="ar-button" class="btn" style="position:absolute;bottom:16px;right:16px;">
  📱 用手機看 AR
</button>
</model-viewer>

<!-- 操作提示 -->

<div class="controls-hint">

<div><span class="icon">🖱️</span> 左鍵拖動 = 旋轉</div>

<div><span class="icon">🔍</span> 滾輪 = 放大／縮小</div>

<div><span class="icon">✋</span> 右鍵拖動 = 平移</div>

<div><span class="icon">📱</span> 手機：單指轉、雙指縮放</div>

</div>

<!-- 零件資訊 -->

<div class="info-card">

<h3>🔧 本步驟零件說明</h3>

<ul>

<li><b>車頭羊角（Steering Knuckle）</b>：連接前輪與轉向系統的關鍵零件</li>

<li><b>M4x0.7 螺絲</b>：螺距 0.7mm，露出長度約 3mm</li>

<li><b>組裝要點</b>：將螺絲對準羊角孔位，順時針鎖入至完全固定（✔ ASSEMBLED）</li>

</ul>

</div>

<!-- 功能按鈕 -->

<div class="btn-row">

<button class="btn" onclick="resetView()">🔄 重置視角</button>

<button class="btn secondary" onclick="toggleRotate()">⏯️ 開／關 自動旋轉</button>

</div>

</div>

<script>

const viewer = document.getElementById('viewer');

function resetView() {

viewer.cameraOrbit = '45deg 65deg 4m';

viewer.fieldOfView = 'auto';

}

function toggleRotate() {

if (viewer.hasAttribute('auto-rotate')) {

viewer.removeAttribute('auto-rotate');

} else {

viewer.setAttribute('auto-rotate', '');

}

}

</script>

</body>

</html>

</artifact>
