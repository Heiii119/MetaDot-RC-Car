<style>

body {

font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;

background: #f5f5f2;

<body>

<header>

<div class="logo">◆ META DOT</div>

<h1>零件組裝 · 互動 3D 教學</h1>

</header>

<div class="container">

<div class="step-tag">第三步</div>
<div class="step-desc">🏁 組裝 — 拖動滑桿或按「播放組裝」，觀看軸承壓入羊角的過程</div>

<!-- 3D 舞台 -->
<div id="stage">
  <div id="loading">載入模型中… ⏳</div>
  <div class="assembly-control">
    <label>分解</label>
    <input type="range" id="slider" min="0" max="100" value="0">
    <label>組合</label>
  </div>
</div>

<div class="controls-hint">
  <div><span class="icon">🖱️</span> 左鍵拖動 = 旋轉</div>
  <div><span class="icon">🔍</span> 滾輪 = 放大／縮小</div>
  <div><span class="icon">✋</span> 右鍵拖動 = 平移</div>
  <div><span class="icon">🎚️</span> 滑桿 = 控制組裝進度</div>
</div>

<div class="info-card">
  <h3>🔧 組裝步驟說明</h3>
  <ul>
    <li><b>步驟 1</b>：將<b>軸承</b>對準<b>羊角</b>的軸心孔位</li>
    <li><b>步驟 2</b>：沿軸線方向平行壓入，切勿歪斜</li>
    <li><b>步驟 3</b>：確認軸承完全平貼羊角座 ✔ ASSEMBLED</li>
    <li>💡 拖動滑桿可反覆檢視「分解 ↔ 組合」的相對位置</li>
  </ul>
</div>

<div class="btn-row">
  <button class="btn play" onclick="playAssemble()">▶️ 播放組裝</button>
  <button class="btn" onclick="resetView()">🔄 重置視角</button>
  <button class="btn prev" onclick="goPrevStep()">⬅️ 上一步：軸承</button>
</div>

</div>

<!-- Three.js -->

<script type="importmap">

{

"imports": {

"three": "https://unpkg.com/three@0.160.0/build/three.module.js",

"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

}

}

</script>

<script type="module">

import * as THREE from 'three';

import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const stage = document.getElementById('stage');

const W = () => stage.clientWidth;

const H = () => stage.clientHeight;

const scene = new THREE.Scene();

scene.background = new THREE.Color(0xf0f0ec);

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.01, 1000);

camera.position.set(3, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });

renderer.setSize(W(), H());

renderer.setPixelRatio(window.devicePixelRatio);

stage.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const dir = new THREE.DirectionalLight(0xffffff, 1.2);

dir.position.set(5, 10, 7); scene.add(dir);

const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);

dir2.position.set(-5, -3, -5); scene.add(dir2);

const controls = new OrbitControls(camera, renderer.domElement);

controls.enableDamping = true;

controls.dampingFactor = 0.08;

const loader = new GLTFLoader();

let partA, partB;

/* 🔧 分解 / 組合位置（依你的模型調整）*/

const A_apart = new THREE.Vector3(-1.5, 0, 0); // 羊角 分開位置

const B_apart = new THREE.Vector3( 1.5, 0, 0); // 軸承 分開位置

const A_together = new THREE.Vector3(-0.3, 0, 0); // 羊角 組合位置

const B_together = new THREE.Vector3( 0.2, 0, 0); // 軸承 組合位置

let loadedCount = 0;

function checkLoaded() {

loadedCount++;

if (loadedCount === 2) {

document.getElementById('loading').style.display = 'none';

fitCameraToScene();

updatePositions(0);

}

}

// 🔧 換成你的檔名

loader.load('FrontUpright.glb', (gltf) => {

partA = gltf.scene; scene.add(partA); checkLoaded();

}, undefined, (err) => {

console.error('FrontUpright 載入失敗', err);

document.getElementById('loading').innerHTML = '❌ FrontUpright.glb 載入失敗';

});

loader.load('Bearing.glb', (gltf) => {

partB = gltf.scene; scene.add(partB); checkLoaded();

}, undefined, (err) => {

console.error('Bearing 載入失敗', err);

document.getElementById('loading').innerHTML = '❌ Bearing.glb 載入失敗';

});

function updatePositions(t) {

if (partA) partA.position.lerpVectors(A_apart, A_together, t);

if (partB) partB.position.lerpVectors(B_apart, B_together, t);

}

/* 自動調整相機距離，讓兩零件都在畫面內 */

function fitCameraToScene() {

const box = new THREE.Box3();

if (partA) box.expandByObject(partA);

if (partB) box.expandByObject(partB);

const size = box.getSize(new THREE.Vector3());

const center = box.getCenter(new THREE.Vector3());

const maxDim = Math.max(size.x, size.y, size.z) + 3; // +3 預留分解空間

const dist = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360));

camera.position.set(center.x + dist*0.6, center.y + dist*0.4, center.z + dist);

controls.target.copy(center);

controls.update();

}

const slider = document.getElementById('slider');

slider.addEventListener('input', () => updatePositions(slider.value / 100));

window.playAssemble = function () {

slider.value = 0; updatePositions(0);

const duration = 1500, t0 = performance.now();

function anim(now) {

let p = Math.min((now - t0) / duration, 1);

const eased = 1 - Math.pow(1 - p, 3);

slider.value = eased * 100;

updatePositions(eased);

if (p < 1) requestAnimationFrame(anim);

}

requestAnimationFrame(anim);

};

window.resetView = function () { fitCameraToScene(); };

window.goPrevStep = function () { window.location.href = "tt02_step2.html"; };

function loop() {

requestAnimationFrame(loop);

controls.update();

renderer.render(scene, camera);

}

loop();

window.addEventListener('resize', () => {

camera.aspect = W()/H();

camera.updateProjectionMatrix();

renderer.setSize(W(), H());

});

</script>

</body>

</html>
